<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apis Math Tutor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>

    <style>
        /* Dark Mode fixes for KaTeX Math text */
        .dark .katex { color: #e2e8f0; } 
        .dark .prose strong { color: #f8fafc; }
        
        /* MAGIC TRICK: Perfectly invert the graph colors in Dark Mode! */
        .dark .function-plot { 
            filter: invert(0.85) hue-rotate(180deg); 
        }

        .moving-gradient {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Force long math equations to stay inside the box with a scrollbar */
        .katex-display {
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px;
        }
    </style>
</head>
<body class="moving-gradient min-h-screen p-4 md:p-8 flex flex-col items-center transition-colors duration-300">

    <div class="w-full max-w-2xl bg-slate-50 dark:bg-slate-900 rounded-2xl shadow-lg p-6 mt-8 transition-colors duration-300">
        
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
            <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400">Apis Math Tutor</h1>
            
            <div class="flex items-center gap-2 whitespace-nowrap overflow-x-auto pb-1 md:pb-0">
                
                <select id="difficultySelect" class="bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-gray-200 text-xs sm:text-sm font-semibold rounded-lg px-2 py-2 focus:outline-none transition-colors cursor-pointer">
                    <option value="Basic">👶 Basic</option>
                    <option value="Intermediate" selected>🧑‍🎓 Intermediate</option>
                    <option value="Advanced">🧠 Advanced</option>
                </select>

                <select id="languageSelect" class="bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-gray-200 text-xs sm:text-sm font-semibold rounded-lg px-2 py-2 focus:outline-none transition-colors cursor-pointer">
                    <option value="English">English (main)</option>
                    <option value="Malay">Bahasa Melayu</option>
                    <option value="Spanish">Español</option>
                    <option value="Chinese">中文</option>
                    <option value="Arabic">العربية</option>
                </select>
                
                <button onclick="toggleDarkMode()" class="text-lg p-1.5 sm:p-2 rounded-full bg-gray-200 dark:bg-slate-700 hover:bg-gray-300 dark:hover:bg-slate-600 transition-colors shrink-0" title="Toggle Dark Mode">
                    🌗
                </button>
            </div>
        </div>
        <p class="text-gray-500 dark:text-gray-400 mb-6">Type a math problem or upload a photo, and Apis will explain it step-by-step.</p>

        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">📸 Take a Photo or Upload</label>
            <input type="file" id="imageInput" accept="image/*" onchange="openCropModal(event)"
                class="block w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 dark:file:bg-slate-800 file:text-blue-700 dark:file:text-blue-400 hover:file:bg-blue-200 transition-colors" />
            
            <div id="imagePreviewContainer" class="hidden relative inline-block mt-3">
                <img id="imagePreview" class="max-h-48 rounded-lg shadow-sm border border-gray-200 dark:border-slate-700" />
                <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white w-7 h-7 rounded-full shadow-lg flex items-center justify-center font-bold transition-colors" title="Remove Image">✕</button>
            </div>
        </div>

        <div id="cropModal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex flex-col items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-800 p-4 rounded-xl w-full max-w-lg flex flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white">Crop & Rotate</h3>
                    <button onclick="closeCropModal()" class="text-gray-500 hover:text-red-500 font-bold">✕ (Esc)</button>
                </div>
                <div class="w-full h-[50vh] bg-gray-200 dark:bg-gray-900 overflow-hidden rounded-lg">
                    <img id="cropImageTarget" class="block max-w-full" />
                </div>
                <div class="mt-4 flex justify-between gap-2">
                    <button onclick="cropper.rotate(90)" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">↻ Rotate</button>
                    <button onclick="applyCrop()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">✔ Apply</button>
                </div>
            </div>
        </div>

        <textarea id="problemInput" rows="3" 
            class="w-full bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-lg transition-colors" 
            placeholder="e.g., Solve for x: 2x + 5 = 15"></textarea>
            
        <textarea id="attemptInput" rows="2" 
            class="w-full bg-blue-50 dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 rounded-lg p-4 mt-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-base transition-colors" 
            placeholder="Where did you get stuck? Paste your attempt here (Optional)"></textarea>
            
        <button id="solveBtn" onclick="solveMath()" 
            class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
            Solve Problem
        </button>

        <div id="loading" class="hidden mt-6 text-center text-gray-500 dark:text-gray-400">
            <p class="animate-pulse">Apis is Thinking... (This may take a few seconds)</p>
        </div>

        <div id="resultsArea" class="hidden mt-8 border-t border-gray-200 dark:border-slate-700 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-200">Explanation</h2>
                <button onclick="downloadPDF()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-semibold py-2 px-4 rounded-lg shadow transition-colors">
                    📄 Save as PDF
                </button>
            </div>
            
            <div id="explanationText" class="prose max-w-none text-gray-700 dark:text-gray-300 space-y-4 break-words overflow-x-auto bg-slate-50 dark:bg-slate-900 p-2"></div>

            <div class="mt-8 border-t border-gray-200 dark:border-slate-700 pt-6">
                <button id="practiceBtn" onclick="generatePractice()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm">
                    ✨ Give me 2 similar practice problems
                </button>
                <div id="practiceLoading" class="hidden mt-4 text-center text-indigo-500 dark:text-indigo-400 font-semibold animate-pulse">
                    Generating problems...
                </div>
                <div id="practiceCards" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 hidden">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Store the AI's explanation so the Practice Generator knows what math was just solved
        let currentSolutionText = "";

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        function downloadPDF() {
            const element = document.getElementById('explanationText');
            element.classList.remove('overflow-x-auto');
            const opt = {
                margin:       0.5,
                filename:     'Apis_Math_Solution.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.add('overflow-x-auto');
            });
        }

        let cropper = null;
        let finalImageBase64 = null;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!document.getElementById('cropModal').classList.contains('hidden')) closeCropModal();
            }
        });

        function openCropModal(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('cropImageTarget').src = e.target.result;
                document.getElementById('cropModal').classList.remove('hidden');
                if (cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('cropImageTarget'), {
                    viewMode: 1, autoCropArea: 0.9, background: false
                });
            };
            reader.readAsDataURL(file);
        }

        function closeCropModal() {
            document.getElementById('cropModal').classList.add('hidden');
            if (cropper) cropper.destroy();
            if (!finalImageBase64) document.getElementById('imageInput').value = "";
        }

        function applyCrop() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas();
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            finalImageBase64 = dataUrl.split(',')[1]; 
            document.getElementById('imagePreview').src = dataUrl;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
            closeCropModal();
        }

        function removeImage() {
            finalImageBase64 = null;
            document.getElementById('imageInput').value = "";
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = "";
        }

        function fillProblem(text) {
            document.getElementById('problemInput').value = text;
            document.getElementById('attemptInput').value = ""; 
            removeImage(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function generatePractice() {
            document.getElementById('practiceBtn').classList.add('hidden');
            document.getElementById('practiceLoading').classList.remove('hidden');
            document.getElementById('practiceCards').classList.add('hidden');

            // Grab the selected language
            const language = document.getElementById('languageSelect').value;

            // Tell the AI to use the correct language
            const prompt = `Based on this math solution:
            ${currentSolutionText}
            
            Generate EXACTLY 2 similar practice problems for the student to try. 
            Format the output strictly as a list separated by a pipeline character (|).
            Example: Solve for x: 3x + 2 = 11 | Solve for x: 5x - 4 = 16
            Do NOT write any other text. ONLY the two problems separated by |
            CRITICAL INSTRUCTION: You MUST write the practice problems entirely in ${language}.`;

            try {
                // REAL PRODUCTION API CALL
                const response = await fetch('/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                const problems = data.result.split('|').map(p => p.trim());
                
                let cardsHtml = '';
                problems.forEach(p => {
                    if(p) {
                        cardsHtml += `
                        <div onclick="fillProblem(this.getAttribute('data-problem'))" data-problem="${p.replace(/"/g, '&quot;')}" 
                             class="cursor-pointer bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-900 hover:border-indigo-500 dark:hover:border-indigo-400 hover:shadow-md p-4 rounded-xl transition-all">
                            <p class="text-indigo-600 dark:text-indigo-400 text-sm font-bold mb-2 uppercase tracking-wider">Practice Problem</p>
                            <p class="text-gray-800 dark:text-gray-200 font-medium">${p}</p>
                        </div>`;
                    }
                });
                
                document.getElementById('practiceCards').innerHTML = cardsHtml;
                document.getElementById('practiceLoading').classList.add('hidden');
                document.getElementById('practiceCards').classList.remove('hidden');

                // NEW: Render KaTeX inside the practice cards so the $ signs turn into beautiful math!
                renderMathInElement(document.getElementById('practiceCards'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });
                
            } catch (error) {
                console.error("Practice Generation Error:", error);
                alert("Failed to generate practice problems.");
                document.getElementById('practiceBtn').classList.remove('hidden');
                document.getElementById('practiceLoading').classList.add('hidden');
            }
        }

        async function solveMath() {
            const input = document.getElementById('problemInput').value;
            const attempt = document.getElementById('attemptInput').value; 
            const language = document.getElementById('languageSelect').value;
            const difficulty = document.getElementById('difficultySelect').value;
            
            if (!input && !finalImageBase64) {
                return alert("Please enter a math problem or upload a photo!");
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultsArea').classList.add('hidden');
            document.getElementById('practiceBtn').classList.remove('hidden');
            document.getElementById('practiceCards').classList.add('hidden');
            document.getElementById('solveBtn').disabled = true;

            const basePrompt = `You are a master math tutor. 
            Analyze the provided problem (and image if provided). 
            You MUST format your response EXACTLY following this strict structure. Leave a blank line between every part:

            **Step [Number]: [Brief Title of the Action]**

            [The Mathematical Equation using block LaTeX wrapped in double $$]

            **💡 [Translate 'Why This Step?' to the requested language]** [Explain the concept]

            **⚠️ [Translate 'Common Mistake:' to the requested language]** [Highlight a general mistake]

            ---

            Finally, provide the **[Translate 'Final Answer:' to the requested language]**.
            Use LaTeX formatting ONLY for mathematical formulas. 
            CRITICAL RULE 1: NEVER wrap regular English text inside LaTeX delimiters. 
            CRITICAL RULE 2: NEVER chain multiple long equations on a single line. You MUST break long calculations into separate new lines.

            GRAPHING INSTRUCTION:
            If a graph is needed, provide the raw equation wrapped EXACTLY in a markdown code block labeled 'graph'.
            \`\`\`graph
            x^2 + 2*x - 5
            \`\`\`
            CRITICAL GRAPH RULES: 
            1. EACH function MUST be on its own NEW LINE. 
            2. NEVER include "y =" or "f(x) =" or "x =". ONLY write the right side of the equation.
            3. NO COMMENTS. DO NOT use the '#' symbol and DO NOT write any English words inside the graph block.
            4. Explicitly use the '*' symbol for multiplication.`;

            let finalPrompt = basePrompt;
            if (attempt.trim() !== "") {
                finalPrompt = `User's Attempt: ${attempt}\n\nFirst, provide a **🔍 Error Diagnosis**. Explain where they went wrong. Next, provide a **🧠 Mini-Lesson**. Then show the correct solution using the structure below.\n\n` + basePrompt;
            }

            // --- THE MISSING LINK ---
            // This grabs what you typed in the box and hands it to the AI!
            finalPrompt += `\n\n**PROBLEM TO SOLVE:**\n${input}`;

            let difficultyInstruction = "";
            if (difficulty === "Basic") difficultyInstruction = "Explain as if the student is a beginner. Break down every single basic arithmetic step. Use simple analogies and easy vocabulary.";
            if (difficulty === "Intermediate") difficultyInstruction = "Provide a standard, clear explanation suitable for a high school student.";
            if (difficulty === "Advanced") difficultyInstruction = "Explain at a college level. Be highly concise, skip basic arithmetic steps, and use advanced mathematical terminology.";

            finalPrompt += `\n\nCRITICAL INSTRUCTION: You MUST explain the steps and write the final answer entirely in ${language}.`;
            finalPrompt += `\nDIFFICULTY LEVEL: ${difficultyInstruction}`;

            try {
                // REAL PRODUCTION API CALL
                const response = await fetch('/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: finalPrompt, 
                        image: finalImageBase64 
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                let finalOutput = data.result;
                currentSolutionText = finalOutput;

                const explanationDiv = document.getElementById('explanationText');
                explanationDiv.innerHTML = marked.parse(finalOutput);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultsArea').classList.remove('hidden');
                
                renderMathInElement(explanationDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });

                const graphBlocks = explanationDiv.querySelectorAll('code.language-graph');
                if (graphBlocks.length > 0) {
                    graphBlocks.forEach((block, index) => {
                        const preNode = block.parentNode; 
                        const container = document.createElement('div');
                        container.id = 'math-graph-' + index;
                        container.className = 'my-6 flex justify-center bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 w-full h-80 overflow-hidden';
                        preNode.replaceWith(container); 

                        try {
                            let cleanText = block.textContent.replace(/y\s*=/gi, '\n').replace(/f\(x\)\s*=/gi, '\n');
                            const rawLines = cleanText.split('\n');
                            const plotData = [];
                            
                            rawLines.forEach(line => {
                                let cleanLine = line.split('#')[0].split('for')[0].trim();
                                if (cleanLine.endsWith(',')) cleanLine = cleanLine.slice(0, -1);
                                if (cleanLine !== "" && !cleanLine.includes("x=") && !cleanLine.includes("x =") && !cleanLine.includes("y=") && !cleanLine.includes("y =")) {
                                    cleanLine = cleanLine.replace(/(\d)\s*x/g, '$1*x');
                                    plotData.push({ fn: cleanLine });
                                }
                            });

                            functionPlot({
                                target: '#' + container.id,
                                width: container.clientWidth - 40,
                                height: 300,
                                grid: true,
                                data: plotData
                            });
                        } catch (err) {
                            console.error("Graph rendering failed:", err);
                            container.innerHTML = "<p class='text-red-500'>Graph could not be rendered.</p>";
                        }
                    });
                }
            } 
            catch (error) {
                console.error(error);
                alert("Error connecting to the AI: " + error.message);
                document.getElementById('loading').classList.add('hidden');
            } finally {
                document.getElementById('solveBtn').disabled = false;
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
