<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apis Math Tutor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://unpkg.com/d3@7"></script>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>

    <style>
        .moving-gradient {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Force long math equations to stay inside the box with a scrollbar */
        .katex-display {
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px;
        }
    </style>
</head>
<body class="moving-gradient min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-2xl bg-slate-50 rounded-2xl shadow-lg p-6 mt-8">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">Apis Math Tutor</h1>
        <p class="text-gray-500 mb-6">Type a math problem or upload a photo, and Apis will explain it step-by-step.</p>

        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-700">📸 Take a Photo or Upload</label>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)"
                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200" />
            <img id="imagePreview" class="hidden mt-3 max-h-48 rounded-lg shadow-sm border border-gray-200" />
        </div>

        <textarea id="problemInput" rows="3" 
            class="w-full border border-gray-300 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-lg" 
            placeholder="e.g., Solve for x: 2x + 5 = 15"></textarea>
            
        <textarea id="attemptInput" rows="2" 
            class="w-full border border-gray-300 rounded-lg p-4 mt-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-base bg-blue-50" 
            placeholder="Where did you get stuck? Paste your attempt here (Optional)"></textarea>
            
        <button id="solveBtn" onclick="solveMath()" 
            class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">
            Solve Problem
        </button>

        <div id="loading" class="hidden mt-6 text-center text-gray-500">
            <p class="animate-pulse">Apis is Thinking... (This may take a few seconds)</p>
        </div>

        <div id="resultsArea" class="hidden mt-8 border-t pt-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Explanation</h2>
            <div id="explanationText" class="prose max-w-none text-gray-700 space-y-4 break-words overflow-x-auto"></div>
        </div>
    </div>

    <script>
        let uploadedImageBase64 = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height = Math.round(height *= MAX_WIDTH / width);
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width = Math.round(width *= MAX_HEIGHT / height);
                            height = MAX_HEIGHT;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 

                    const preview = document.getElementById('imagePreview');
                    preview.src = dataUrl;
                    preview.classList.remove('hidden');
                    
                    uploadedImageBase64 = dataUrl.split(',')[1]; 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function solveMath() {
            const input = document.getElementById('problemInput').value;
            const attempt = document.getElementById('attemptInput').value; 
            
            if (!input && !uploadedImageBase64) {
                return alert("Please enter a math problem or upload a photo!");
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultsArea').classList.add('hidden');
            document.getElementById('solveBtn').disabled = true;

            const basePrompt = `You are a master math tutor. 
            Analyze the provided problem (and image if provided). 
            You MUST format your response EXACTLY following this strict structure. Leave a blank line between every part:

            **Step [Number]: [Brief Title of the Action]**

            [The Mathematical Equation using block LaTeX wrapped in double $$]

            **💡 Why This Step?** [Explain the concept]

            **⚠️ Common Mistake:** [Highlight a general mistake]

            ---

            Finally, provide the **Final Answer**.
            Use LaTeX formatting ONLY for mathematical formulas. 
            CRITICAL RULE 1: NEVER wrap regular English text inside LaTeX delimiters. 
            CRITICAL RULE 2: NEVER chain multiple long equations on a single line. You MUST break long calculations into separate new lines.

            GRAPHING INSTRUCTION:
            If a graph is needed, provide the raw equation wrapped EXACTLY in a markdown code block labeled 'graph'.
            \`\`\`graph
            x^2 + 2*x - 5
            \`\`\`
            CRITICAL GRAPH RULES: 
            1. EACH function MUST be on its own NEW LINE. 
            2. NEVER include "y =" or "f(x) =" or "x =". ONLY write the right side of the equation.
            3. NO COMMENTS. DO NOT use the '#' symbol and DO NOT write any English words inside the graph block.
            4. Explicitly use the '*' symbol for multiplication (e.g., write 2/3*x instead of 2/3x).`;

            
            let finalPrompt = basePrompt;
            if (attempt.trim() !== "") {
                finalPrompt = `User's Attempt: ${attempt}\n\nFirst, provide a **🔍 Error Diagnosis**. Explain where they went wrong. Next, provide a **🧠 Mini-Lesson**. Then show the correct solution using the structure below.\n\n` + basePrompt;
            }

            try {
                const response = await fetch('/api/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: finalPrompt + "\nProblem: " + input,
                        image: uploadedImageBase64 
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                let finalOutput = data.result;

                const explanationDiv = document.getElementById('explanationText');
                explanationDiv.innerHTML = marked.parse(finalOutput);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultsArea').classList.remove('hidden');
                
                // Render Math
                renderMathInElement(explanationDiv, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });

                // Render Graphs
                const graphBlocks = explanationDiv.querySelectorAll('code.language-graph');
                if (graphBlocks.length > 0) {
                    graphBlocks.forEach((block, index) => {
                        const preNode = block.parentNode; 
                        const container = document.createElement('div');
                        container.id = 'math-graph-' + index;
                        container.className = 'my-6 flex justify-center bg-white rounded-xl shadow-sm border border-gray-200 p-4 w-full h-80';
                        preNode.replaceWith(container); 

                        try {
                            // 1. Aggressively clean the AI's output before splitting
                            let cleanText = block.textContent.replace(/y\s*=/gi, '\n').replace(/f\(x\)\s*=/gi, '\n');
                            
                            const rawLines = cleanText.split('\n');
                            const plotData = [];
                            
                            // 2. Loop through each line and clean it up
                            rawLines.forEach(line => {
                                // Strip out any comments starting with '#' or the word 'for'
                                let cleanLine = line.split('#')[0].split('for')[0].trim();
                                
                                if (cleanLine.endsWith(',')) cleanLine = cleanLine.slice(0, -1);
                                
                                // Ignore empty lines, vertical lines (x=), or horizontal axes (y=0)
                                if (cleanLine !== "" && !cleanLine.includes("x=") && !cleanLine.includes("x =") && !cleanLine.includes("y=") && !cleanLine.includes("y =")) {
                                    // Add explicit multiplication for fractions attached to x
                                    cleanLine = cleanLine.replace(/(\d)\s*x/g, '$1*x');
                                    plotData.push({ fn: cleanLine });
                                }
                            });

                            // 3. Draw the graph
                            functionPlot({
                                target: '#' + container.id,
                                width: container.clientWidth - 40,
                                height: 300,
                                grid: true,
                                data: plotData
                            });
                        } catch (err) {
                            console.error("Graph rendering failed:", err);
                            container.innerHTML = "<p class='text-red-500'>Graph could not be rendered for: " + block.textContent + "</p>";
                        }
                    });
                }
            } 
            catch (error) {
                console.error(error);
                alert("Error connecting to the AI: " + error.message);
                document.getElementById('loading').classList.add('hidden');
            } finally {
                document.getElementById('solveBtn').disabled = false;
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
